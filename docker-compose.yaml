x-constants:
  mount_point: &mount_point ${RFS__MOUNT_POINT}
  server_url: &server_url ${RFS__SERVER_URL:-http://${RFS__SERVER_HOST:-server}:${RFS__SERVER_PORT:-8080}}
  database_path: &database_path ${DATABASE_PATH:-database/db.sqlite}

services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        bin_name: server # the name of the package
    container_name: remote_fs-server
    ports:
      - "${RFS__SERVER_PORT:-8080}:8080"
    volumes:
      - remote_fs_data:${RFS__FILESYSTEM_ROOT:-/remote_fs}
    environment:
      RFS__SERVER_HOST: ${RFS__SERVER_HOST:-server}
      RFS__SERVER_PORT: ${RFS__SERVER_PORT:-8080}
      RFS__FILESYSTEM_ROOT: ${RFS__FILESYSTEM_ROOT:-/remote_fs}
      DATABASE_PATH: *database_path
    env_file:
      - server/.env
    command: >
      run

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
      args:
        bin_name: client # the name of the package
    container_name: remote_fs-client
    # privileged: true
    # network: host # in case X11 does not work properly
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    # depends_on:
    #   - server
    environment:
      RFS__MOUNT_POINT: *mount_point
      RFS__SERVER_URL: *server_url
      DISPLAY: ${DISPLAY}
      SLINT_BACKEND: software
      WINIT_UNIX_BACKEND: x11
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    env_file:
      - client/.env
    # command: >
    #   run --mount-point ${RFS__MOUNT_POINT} --server-url ${RFS__SERVER_URL}
    tty: true # Keep the terminal open
    entrypoint: [ "/bin/bash" ]

  develop:
    image: rust:slim
    container_name: remote_fs-develop
    network_mode: host # <--- Aggiunto per vedere WSLg (:0)
    ipc: host # <--- Aggiunto per la memoria condivisa X11
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=
      - XDG_RUNTIME_DIR=
      - SLINT_BACKEND=software
      - WINIT_UNIX_BACKEND=x11
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    volumes:
      - .:${APP_PATH}/
      - /tmp/.X11-unix:/tmp/.X11-unix
      # - ./mount_dir:${RFS__FILESYSTEM_ROOT}
    working_dir: ${APP_PATH}
    tty: true # Keep the terminal open
    restart: unless-stopped # Automatically restart unless stopped manually

volumes:
  remote_fs_data:
