services:
  server:
    build:
      context: ./server
      args:
        app_path: ${APP_PATH}
        remote_fs_server: server # the name of the package
    container_name: remote_fs-server
    ports:
      - "8080:8080"
    networks:
      - remote-fs-net

  client:
    build:
      context: ./client
      args:
        app_path: ${APP_PATH}
        remote_fs_client: client # the name of the package
    container_name: remote_fs-client
    # privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    volumes:
      - ./mount:${MOUNT_POINT} # Host directory to see FS mount
    # depends_on:
    #   - server
    # command: >
    #   --mountpoint ${MOUNT_POINT} 
    #   --server-url http://server:8080/api

  develop:
    image: rust:slim
    container_name: remote_fs-develop
    # privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    networks:
      - remote-fs-net
    volumes:
      # - ./server:${APP_PATH}/server/
      # - ./client:${APP_PATH}/client/
      - .:${APP_PATH}/
      - ./mount:${FS_ROOT} # Host directory to see FS mount
    working_dir: ${APP_PATH}/
    tty: true # Keep the terminal open
    restart: unless-stopped # Automatically restart unless stopped manually

networks:
  remote-fs-net:
