x-constants:
  app_path: &app_path ${APP_PATH}
  mount_point: &mount_point ${RFS__MOUNT_POINT}
  fs_root: &fs_root ${RFS__FILESYSTEM_ROOT}
  server_url: &server_url http://${RFS__SERVER_HOST:-server}:${RFS__SERVER_PORT:-8080}
  database_path: &database_path ${DATABASE_PATH}

services:
  server:
    build:
      context: ./server
      args:
        app_path: *app_path
        remote_fs_server: server # the name of the package
    container_name: remote_fs-server
    ports:
      - "${RFS__SERVER_PORT:-8080}:8080"
    volumes:
      - remote_fs_data:${RFS__FILESYSTEM_ROOT}
    environment:
      RFS__SERVER_HOST: ${RFS__SERVER_HOST:-server}
      RFS__SERVER_PORT: ${RFS__SERVER_PORT:-8080}
      RFS__FILESYSTEM_ROOT: *fs_root
      DATABASE_PATH: *database_path
    networks:
      - remote-fs-net
    command: >
      run

  client:
    build:
      context: ./client
      args:
        app_path: *app_path
        remote_fs_client: client # the name of the package
    container_name: remote_fs-client
    # privileged: true
    networks:
      - remote-fs-net
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    depends_on:
      - server
    environment:
      RFS__MOUNT_POINT: *mount_point
      RFS__SERVER_URL: *server_url
    # command: >
    #   run --mount-point ${RFS__MOUNT_POINT} --server-url ${RFS__SERVER_URL}
    tty: true # Keep the terminal open
    entrypoint: [ "/bin/bash" ]

  develop:
    image: rust:slim
    container_name: remote_fs-develop
    # privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    networks:
      - remote-fs-net
    volumes:
      - .:${APP_PATH}/
      - ./mount_dir:${RFS__FILESYSTEM_ROOT} # Server FS root for testing purposes
    working_dir: *app_path
    tty: true # Keep the terminal open
    restart: unless-stopped # Automatically restart unless stopped manually

volumes:
  remote_fs_data:


networks:
  remote-fs-net:
